<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 300px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        input { width: 100%; margin: 10px 0; padding: 8px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SI Calculator</h2>
        <input type="number" id="p" placeholder="Principal Amount">
        <input type="number" id="r" placeholder="Rate of Interest (%)">
        <input type="number" id="t" placeholder="Time (Years)">
        <button onclick="calculate()">Calculate</button>
        <h3 id="result"></h3>
    </div>

    <script>
        function calculate() {
            let p = document.getElementById('p').value;
            let r = document.getElementById('r').value;
            let t = document.getElementById('t').value;
            let si = (p * r * t) / 100;
            document.getElementById('result').innerText = "Interest: " + si;
        }
    </script>
</body>
</html>
